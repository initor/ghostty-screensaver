name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ghostty.saver
        run: |
          xcodebuild clean build \
            -project ghostty.xcodeproj \
            -scheme ghostty \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO
