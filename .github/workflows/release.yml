name: Release

on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

# Prevent parallel releases from racing on tag creation
concurrency:
  group: release

jobs:
  release:
    name: Build and Release
    runs-on: macos-15
    # Run on tag push, or when CI succeeded on main
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            # Auto-increment patch version from latest vX.Y.Z tag
            LATEST=$(git tag -l 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [ -z "$LATEST" ]; then
              echo "tag=v1.0.0" >> "$GITHUB_OUTPUT"
            else
              PREFIX=$(echo "$LATEST" | sed 's/\.[0-9]*$//')
              PATCH=$(echo "$LATEST" | sed 's/v[0-9]*\.[0-9]*\.//')
              echo "tag=${PREFIX}.$((PATCH + 1))" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check signing availability
        id: signing
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
        run: |
          if [ -n "$DEVELOPER_ID_CERTIFICATE" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import signing certificate
        if: steps.signing.outputs.available == 'true'
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$DEVELOPER_ID_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$DEVELOPER_ID_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build ghostty.saver (signed)
        if: steps.signing.outputs.available == 'true'
        run: |
          xcodebuild clean build \
            -project ghostty.xcodeproj \
            -scheme ghostty \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime"

      - name: Build ghostty.saver (unsigned)
        if: steps.signing.outputs.available != 'true'
        run: |
          xcodebuild clean build \
            -project ghostty.xcodeproj \
            -scheme ghostty \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO

      - name: Ad-hoc sign bundle (unsigned builds)
        if: steps.signing.outputs.available != 'true'
        run: |
          # Linker-signed binaries have no sealed resources, which causes
          # legacyScreenSaver on macOS 15 to fail loading bundle resources
          # (NSBundle.pathsForResourcesOfType: returns empty in the sandbox).
          # Ad-hoc signing seals the .txt frame files so the sandbox allows access.
          codesign -s - --force ./build/Build/Products/Release/ghostty.saver

      - name: Notarize ghostty.saver
        if: steps.signing.outputs.available == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SAVER_PATH="./build/Build/Products/Release/ghostty.saver"

          ditto -c -k --sequesterRsrc --keepParent "$SAVER_PATH" notarize-submit.zip

          xcrun notarytool submit notarize-submit.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$SAVER_PATH"

      - name: Package ghostty.saver.zip
        run: |
          cd ./build/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent ghostty.saver ghostty.saver.zip

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNING_AVAILABLE: ${{ steps.signing.outputs.available }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if [ "$SIGNING_AVAILABLE" = "true" ]; then
          cat > release-notes.md << 'NOTES'
          ## Installation

          1. Download `ghostty.saver.zip` below and unzip
          2. Double-click `ghostty.saver` to install

          ---
          NOTES
          else
          cat > release-notes.md << 'NOTES'
          ## Installation

          1. Download `ghostty.saver.zip` below and unzip
          2. **Remove the quarantine flag** (required — macOS will say the file is "damaged" without this):
             ```
             xattr -r -d com.apple.quarantine ~/Downloads/ghostty.saver
             ```
             Adjust the path if you unzipped it somewhere other than `~/Downloads`.
          3. Double-click `ghostty.saver` to install

          > **Why?** This build is unsigned (no Apple Developer certificate). macOS blocks
          > unsigned downloads with a misleading "damaged" error. The command above removes
          > the quarantine flag so macOS allows installation.

          ---
          NOTES
          fi

          gh release create "$RELEASE_TAG" \
            --notes-file release-notes.md \
            --generate-notes \
            --title "$RELEASE_TAG" 2>/dev/null || true
          gh release upload "$RELEASE_TAG" \
            ./build/Build/Products/Release/ghostty.saver.zip \
            --clobber

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
