name: Release

# B7 round-2 finding: dropping the workflow_run trigger eliminates the
# auto-release spam (8 of 12 historic tags shipped in a 2 h burst, two
# duplicate-SHA tag pairs). Releases now require an explicit tag push.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3) — only used by manual dispatch."
        required: true
        type: string

permissions:
  contents: write

# Coalesce in-flight releases on rapid tag pushes.
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    name: Build and Release
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          # Strip the leading "v" for MARKETING_VERSION (Apple expects 1.2.3).
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}
          fetch-depth: 0

      - name: Check signing availability
        id: signing
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
        run: |
          if [ -n "$DEVELOPER_ID_CERTIFICATE" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Snapshot keychain search list
        run: |
          # L24 — Capture the original user-domain keychain search list so
          # the cleanup step can restore it. No-op on GitHub-hosted
          # ephemeral runners (image is discarded post-job); load-bearing
          # on self-hosted runners where the original code left the search
          # list permanently mutated.
          security list-keychains -d user > "$RUNNER_TEMP/keychain-original.list"

      - name: Import signing certificate
        if: steps.signing.outputs.available == 'true'
        env:
          DEVELOPER_ID_CERTIFICATE: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$DEVELOPER_ID_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$DEVELOPER_ID_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build ghostty.saver (signed)
        if: steps.signing.outputs.available == 'true'
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
          CURRENT_PROJECT_VERSION: ${{ github.run_number }}
        run: |
          # -destination 'generic/platform=macOS' is required for the
          # build to honor ARCHS = "arm64 x86_64". Plain `xcodebuild
          # build` without a destination locks to the runner's host arch
          # (arm64 on macos-15) — caught during UAT on Xcode 26.
          xcodebuild clean build \
            -project ghostty.xcodeproj \
            -scheme ghostty \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath ./build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$CURRENT_PROJECT_VERSION" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options runtime"

      - name: Build ghostty.saver (unsigned)
        if: steps.signing.outputs.available != 'true'
        env:
          MARKETING_VERSION: ${{ steps.version.outputs.version }}
          CURRENT_PROJECT_VERSION: ${{ github.run_number }}
        run: |
          # See note in the signed-build step on -destination.
          xcodebuild clean build \
            -project ghostty.xcodeproj \
            -scheme ghostty \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath ./build \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$CURRENT_PROJECT_VERSION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Ad-hoc sign bundle (unsigned builds)
        if: steps.signing.outputs.available != 'true'
        run: |
          # Linker-signed binaries have no sealed resources, which causes
          # legacyScreenSaver on macOS 15 to fail loading bundle resources
          # (NSBundle.pathsForResourcesOfType: returns empty in the sandbox).
          # Ad-hoc signing seals the .txt frame files so the sandbox allows access.
          codesign -s - --force ./build/Build/Products/Release/ghostty.saver

      - name: Notarize ghostty.saver
        if: steps.signing.outputs.available == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SAVER_PATH="./build/Build/Products/Release/ghostty.saver"

          ditto -c -k --sequesterRsrc --keepParent "$SAVER_PATH" notarize-submit.zip

          xcrun notarytool submit notarize-submit.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$SAVER_PATH"

      - name: Package ghostty.saver.zip
        run: |
          cd ./build/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent ghostty.saver ghostty.saver.zip

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNING_AVAILABLE: ${{ steps.signing.outputs.available }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if [ "$SIGNING_AVAILABLE" = "true" ]; then
          cat > release-notes.md << 'NOTES'
          ## Installation

          1. Download `ghostty.saver.zip` below and unzip
          2. Double-click `ghostty.saver` to install

          ---
          NOTES
          else
          cat > release-notes.md << 'NOTES'
          ## Installation

          1. Download `ghostty.saver.zip` below and unzip
          2. **Remove the quarantine flag** (required — macOS will say the file is "damaged" without this):
             ```
             xattr -r -d com.apple.quarantine ~/Downloads/ghostty.saver
             ```
             Adjust the path if you unzipped it somewhere other than `~/Downloads`.
          3. Double-click `ghostty.saver` to install

          > **Why?** This build is unsigned (no Apple Developer certificate). macOS blocks
          > unsigned downloads with a misleading "damaged" error. The command above removes
          > the quarantine flag so macOS allows installation.

          ---
          NOTES
          fi

          gh release create "$RELEASE_TAG" \
            --notes-file release-notes.md \
            --generate-notes \
            --title "$RELEASE_TAG" 2>/dev/null || true
          gh release upload "$RELEASE_TAG" \
            ./build/Build/Products/Release/ghostty.saver.zip \
            --clobber

      - name: Clean up keychain and restore search list
        if: always()
        run: |
          # Delete the temporary signing keychain (silent if it never got created).
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true

          # L24 — restore the user-domain search list captured in the
          # snapshot step. The list output is one quoted path per line; we
          # strip quotes/whitespace and rebuild the argument list with
          # xargs so paths with spaces survive intact.
          if [ -f "$RUNNER_TEMP/keychain-original.list" ]; then
            tr -d '"' < "$RUNNER_TEMP/keychain-original.list" \
              | awk 'NF' \
              | xargs -I {} echo {} \
              | xargs security list-keychains -d user -s 2>/dev/null || true
          fi
